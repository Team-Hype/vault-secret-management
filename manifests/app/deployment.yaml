apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-postgres-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-postgres-client

  template:
    metadata:
      labels:
        app: go-postgres-client

      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "postgres-dev"

        vault.hashicorp.com/agent-inject-secret-db.env: "secret/data/postgres/dev"

        vault.hashicorp.com/agent-inject-template-db.env: |
          {{- with secret "secret/data/postgres/dev" -}}
          POSTGRES_HOST={{ .Data.data.POSTGRES_HOST }}
          POSTGRES_PORT={{ .Data.data.POSTGRES_PORT }}
          POSTGRES_USER={{ .Data.data.POSTGRES_USER }}
          POSTGRES_PASSWORD={{ .Data.data.POSTGRES_PASSWORD }}
          POSTGRES_DB={{ .Data.data.POSTGRES_DB }}
          {{- end }}

    spec:
      serviceAccountName: postgres-dev-sa

      containers:
        - name: app
          image: onemoreslacker/sergo

          command:
            - sh
            - -c
            - |
              export $(cat /vault/secrets/db.env | xargs) && \
              sleep infinity
